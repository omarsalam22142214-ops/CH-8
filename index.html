<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر</title>
    <style>
        /* تحويل الصفحة لمشغل فقط بدون هوامش */
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط التحكم العلوي للمشغل */
        .player-header {
            background-color: #111;
            border-bottom: 2px solid #222;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap; /* للسماح بنزول العناصر لو الشاشة صغيرة */
        }

        .admin-btn {
            background-color: #f39c12;
            color: #000;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        /* توحيد كل زراير التحكم العلوية */
        .nav-btn, .rotate-btn, .adblock-btn, .close-top-btn, .external-top-btn {
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        /* ألوان الزراير المتخصصة */
        .nav-btn { background-color: #3498db; }
        .nav-btn:hover { background-color: #2980b9; }

        .rotate-btn { background-color: #9b59b6; }
        .rotate-btn:hover { background-color: #8e44ad; }

        .close-top-btn { background-color: #c0392b; }
        .close-top-btn:hover { background-color: #e74c3c; }

        .external-top-btn { background-color: #8e44ad; }
        .external-top-btn:hover { background-color: #9b59b6; }

        .adblock-btn { background-color: #27ae60; }
        .adblock-btn.disabled { background-color: #c0392b; }

        /* ستايل زرار الاكتشاف للـ WWE */
        .fetch-wwe-btn {
            background-color: #ff4757;
            color: white;
            border: 2px solid transparent;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.4);
        }
        .fetch-wwe-btn:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }
        .fetch-wwe-btn:disabled {
            background-color: #555;
            color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* شريط القنوات قابل للتمرير */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
        }
        
        .tabs-container::-webkit-scrollbar { height: 6px; }
        .tabs-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .tab-btn {
            background-color: #008b8b;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .tab-btn.active {
            background-color: #004d4d;
            border: 1px solid #fff;
        }

        /* تعديل الفيديو */
        .video-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1;
            background-color: #000;
        }

        .video-wrapper.rotated iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: calc(100vh - 75px);
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* توست الإشعارات */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 9999999;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #ff4757;
            direction: rtl;
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* لوحة التعديل */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #444;
            color: white;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px;}
        .form-group input, .form-group select {
            width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #555;
            background-color: #333; color: white; box-sizing: border-box;
        }

        .modal-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        
        .save-btn { background-color: #27ae60; } 
        .close-btn { background-color: #7f8c8d; } 
        
        .export-section {
            border-top: 1px solid #444;
            padding-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-channel-btn { background-color: #d35400; color: white; width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .download-btn { background-color: #2980b9; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .copy-btn { background-color: #8e44ad; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="player-header">
        <div class="top-controls">
            <button class="admin-btn" onclick="openModal()">⚙️ التعديل</button>
            
            <div class="nav-buttons">
                <button id="closeVid" class="close-top-btn" onclick="closePlayer()" style="display: none;">إغلاق ✖</button>
                <button id="externalVid" class="external-top-btn" onclick="openExternal()" style="display: none;">خارجي ↗</button>
                <button class="nav-btn" onclick="prevStream()">السابق ⏮️</button>
                <button class="nav-btn" onclick="nextStream()">التالي ⏭️</button>
                <button class="rotate-btn" onclick="toggleRotation()">تدوير 🔄</button>
                <button id="wweFetchBtn" class="fetch-wwe-btn" onclick="playRandomWWE()">🤼‍♂️ اكتشاف قناة WWE</button>
            </div>

            <button id="adblockBtn" class="adblock-btn disabled" onclick="toggleAdBlock()">🛡️ المانع (مقفول)</button>
        </div>

        <div class="tabs-container" id="mainTabs">
            <button id="btn1" class="tab-btn" data-link="https://dpv6ceilvhyrw.cloudfront.net/playlist.m3u8" onclick="playStream(this)">قناة 1</button>
            <button id="btn2" class="tab-btn" data-link="https://1max.top/live_menu.php" onclick="playStream(this)">قناة 2</button>
            <button id="btn3" class="tab-btn" data-link="https://dailypudding.com/category/alpha.php?cache=15y6sumR&amp;minify=sr&amp;live=ch84_LQ&amp;meu=84-85" onclick="playStream(this)">قناة 3</button>
            <button id="btn4" class="tab-btn" data-link="https://myuno.loreofeldenring.site/dailymotion/live/player/3/3" onclick="playStream(this)">قناة 4</button>
            <button id="btn5" class="tab-btn" data-link="https://www.sawlivenow.com/embed/ch85_LQ/" onclick="playStream(this)">قناة 5</button>
            <button id="btn6" class="tab-btn" data-link="https://1max.top/" onclick="playStream(this)">قناة 6</button>
            <button id="btn7" class="tab-btn" data-link="https://bollyrulezz.in/" onclick="playStream(this)">قناة 7</button>
            <button id="btn8" class="tab-btn" data-link="https://live4m.com/embed1.php?channel=a29_USA_Network_Orig&amp;waiting=1&amp;background=grey" onclick="playStream(this)">قناة 8</button>
            <button id="btn9" class="tab-btn" data-link="https://www.sawlivenow.com/embed/ch85_HD/" onclick="playStream(this)">قناة 9</button>
            <button id="btn10" class="tab-btn" data-link="https://vidsports.me/live.php?stream_ch=usan1" onclick="playStream(this)">قناة 10</button>
            <button id="btn11" class="tab-btn" data-link="https://vidsports.me/live.php?stream_ch=wwelve2" onclick="playStream(this)">قناة 11</button>
            <button id="btn12" class="tab-btn" data-link="https://heelclub.site/" onclick="playStream(this)">قناة 12</button>
            <button id="btn13" class="tab-btn" data-link="https://www.sawlivenow.com/embed/ch83_LQ/" onclick="playStream(this)">قناة 13</button>
            <button id="btn14" class="tab-btn" data-link="https://www.sawlivenow.com/embed/ch81_LQ/" onclick="playStream(this)">قناة 14</button>
            <button id="btn15" class="tab-btn" data-link="https://www.sawlivenow.com/embed/ch82_LQ/" onclick="playStream(this)">قناة 15</button>
            <button id="btn16" class="tab-btn" data-link="https://live4m.com/livetv.php?channel=a29_USA_Network_Orig&amp;heading=USA_Network" onclick="playStream(this)">قناة 16</button>
            <button id="btn17" class="tab-btn" data-link="http://89.149.221.167:8080/live/86321000461/6731909777/87164.m3u8?token=Q1N4NlZKM0kxc2tUQmpt" onclick="playStream(this)">قناة 17</button>
            <button id="btn18" class="tab-btn" data-link="http://83.149.106.236:8080/hls/84a911b03bdeb53639ea95aadb1b723a/102808_2366.ts" onclick="playStream(this)">قناة 18</button>
        </div>
    </div>

    <div class="video-wrapper">
        <iframe id="videoPlayer" src="" allowfullscreen=""></iframe>
    </div>

    <div id="toast"></div>

    <div id="settingsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top:0">إعدادات البث المباشر</h3>
            
            <div class="form-group">
                <label>اختار الزرار للتعديل:</label>
                <select id="buttonSelect" onchange="loadButtonData()"><option value="btn1">قناة 1</option><option value="btn2">قناة 2</option><option value="btn3">قناة 3</option><option value="btn4">قناة 4</option><option value="btn5">قناة 5</option><option value="btn6">قناة 6</option><option value="btn7">قناة 7</option><option value="btn8">قناة 8</option><option value="btn9">قناة 9</option><option value="btn10">قناة 10</option><option value="btn11">قناة 11</option><option value="btn12">قناة 12</option><option value="btn13">قناة 13</option><option value="btn14">قناة 14</option><option value="btn15">قناة 15</option><option value="btn16">قناة 16</option><option value="btn17">قناة 17</option><option value="btn18">قناة 18</option></select>
            </div>

            <div class="form-group">
                <label>الاسم الجديد:</label>
                <input type="text" id="editName">
            </div>

            <div class="form-group">
                <label>اللينك الجديد:</label>
                <input type="text" id="editLink">
            </div>

            <div class="modal-buttons">
                <button class="action-btn save-btn" onclick="applyChanges()">تطبيق التعديل</button>
                <button class="action-btn close-btn" onclick="closeModal()">إغلاق اللوحة</button>
            </div>

            <div class="export-section">
                <button class="add-channel-btn" onclick="addNewChannel()">➕ إضافة قناة بث جديدة</button>
                <button class="download-btn" onclick="downloadFullFile()">💾 حفظ الملف</button>
                <button class="copy-btn" onclick="copyFullCode()">📋 نسخ الكود</button>
            </div>
        </div>
    </div>

    <script>
        // دالة التوست للإشعارات
        function showToast(msg) {
            let toast = document.getElementById("toast");
            toast.innerHTML = msg;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // سحب أسامي الزراير لقائمة التعديل
        function populateSelectMenu() {
            const selectMenu = document.getElementById('buttonSelect');
            selectMenu.innerHTML = ''; 
            document.querySelectorAll('#mainTabs .tab-btn').forEach(btn => {
                selectMenu.innerHTML += `<option value="${btn.id}">${btn.innerText}</option>`;
            });
        }
        populateSelectMenu();

        // تشغيل القناة الأولى بمجرد فتح الصفحة
        window.onload = function() {
            let firstBtn = document.getElementById('btn1');
            if(firstBtn) playStream(firstBtn);
        };

        let adblockEnabled = true;
        function toggleAdBlock() {
            let iframe = document.getElementById('videoPlayer');
            let btn = document.getElementById('adblockBtn');
            adblockEnabled = !adblockEnabled;
            
            if (adblockEnabled) {
                iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
                btn.innerText = '🛡️ المانع (شغال)';
                btn.classList.remove('disabled');
            } else {
                iframe.removeAttribute('sandbox');
                btn.innerText = '🛡️ المانع (مقفول)';
                btn.classList.add('disabled');
            }
            
            let currentSrc = iframe.src;
            if(currentSrc && currentSrc !== window.location.href) {
                iframe.src = currentSrc;
            }
        }

        // تشغيل البث
        function playStream(btnElement) {
            let link = btnElement.getAttribute('data-link');
            document.getElementById('videoPlayer').src = link;
            
            document.getElementById('closeVid').style.display = 'inline-block';
            document.getElementById('externalVid').style.display = 'inline-block';

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }

        // إغلاق المشغل
        function closePlayer() {
            document.getElementById('videoPlayer').src = "";
            document.getElementById('closeVid').style.display = 'none';
            document.getElementById('externalVid').style.display = 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        // الفتح الخارجي
        function openExternal() {
            let currentLink = document.getElementById('videoPlayer').src;
            if (currentLink && currentLink.trim() !== "" && currentLink !== window.location.href) {
                window.open(currentLink, '_blank'); 
            } else {
                alert("مفيش بث شغال حالياً عشان نفتحه!");
            }
        }

        function openModal() {
            populateSelectMenu(); 
            document.getElementById('settingsModal').style.display = 'flex';
            loadButtonData();
        }

        function closeModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function loadButtonData() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            if(btn) {
                document.getElementById('editName').value = btn.innerText;
                document.getElementById('editLink').value = btn.getAttribute('data-link');
            }
        }

        function applyChanges() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            let name = document.getElementById('editName').value;
            let link = document.getElementById('editLink').value;

            btn.innerText = name;
            btn.setAttribute('data-link', link);
            
            let opt = document.querySelector(`#buttonSelect option[value="${id}"]`);
            if(opt) opt.innerText = name;

            if (btn.classList.contains('active')) playStream(btn);
            alert("تم تطبيق التعديل بنجاح!");
        }

        function addNewChannel() {
            let channelName = prompt("اكتب اسم القناة أو البث الجديد:");
            if (!channelName || channelName.trim() === "") return;

            let channelLink = prompt("اكتب لينك البث (الرابط):");
            if (!channelLink) channelLink = "";

            let newId = "btn_new_" + new Date().getTime();

            let newBtn = document.createElement("button");
            newBtn.id = newId;
            newBtn.className = "tab-btn";
            newBtn.setAttribute("data-link", channelLink);
            newBtn.innerText = channelName;
            newBtn.setAttribute("onclick", "playStream(this)");

            document.getElementById("mainTabs").appendChild(newBtn);

            populateSelectMenu();
            document.getElementById("buttonSelect").value = newId;
            loadButtonData();

            alert("تم إضافة القناة بنجاح!");
        }

        function downloadFullFile() {
            closeModal(); 
            setTimeout(() => {
                let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                let blob = new Blob([content], { type: 'text/html' });
                let a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'my_player.html';
                a.click();
            }, 100);
        }

        function copyFullCode() {
            closeModal();
            setTimeout(() => {
                let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                navigator.clipboard.writeText(content).then(() => {
                    alert("تم نسخ الكود بالكامل!");
                });
            }, 100);
        }

        // دالة الانتقال للسيرفر التالي
        function nextStream() {
            let tabs = Array.from(document.querySelectorAll('#mainTabs .tab-btn'));
            if (tabs.length === 0) return;

            let activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
            let nextIndex = (activeIndex + 1) % tabs.length; 
            
            playStream(tabs[nextIndex]);
            tabs[nextIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        // دالة الانتقال للسيرفر السابق
        function prevStream() {
            let tabs = Array.from(document.querySelectorAll('#mainTabs .tab-btn'));
            if (tabs.length === 0) return;

            let activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
            if (activeIndex === -1) activeIndex = 0;

            let prevIndex = (activeIndex - 1 + tabs.length) % tabs.length; 
            
            playStream(tabs[prevIndex]);
            tabs[prevIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        // دالة تدوير الشاشة
        function toggleRotation() {
            let videoWrapper = document.querySelector('.video-wrapper');
            videoWrapper.classList.toggle('rotated');
        }

        // --- الدالة السحرية لاكتشاف قنوات WWE فقط ---
        async function playRandomWWE() {
            let btn = document.getElementById('wweFetchBtn');
            let originalText = btn.innerHTML;
            
            btn.innerHTML = '🤼‍♂️🔍 جاري البحث...';
            btn.disabled = true;
            showToast("جاري اصطياد قناة مصارعة WWE... 🤼‍♂️🔍⏳");

            try {
                let response = await fetch('https://iptv-org.github.io/api/streams.json');
                if (!response.ok) throw new Error("فشل الاتصال");
                
                let streams = await response.json();
                
                // كلمات مفتاحية لفلترة المصارعة فقط
                let wweKeywords = ['wwe', 'wrestling', 'smackdown', 'raw', 'wrestlemania'];
                
                let workingStreams = streams.filter(stream => {
                    let isOnline = stream.status === "online" || stream.status === undefined;
                    let channelId = (stream.channel || "").toLowerCase();
                    let isWWE = wweKeywords.some(kw => channelId.includes(kw));
                    return isOnline && isWWE;
                });

                if (workingStreams.length === 0) {
                    showToast("للأسف ملقيناش قنوات مصارعة شغالة حالياً ❌");
                    return;
                }

                // اختيار قناة عشوائية من اللستة
                let randomIndex = Math.floor(Math.random() * workingStreams.length);
                let randomChannel = workingStreams[randomIndex];

                // إنشاء زرار جديد في شريط القنوات
                let newId = "btn_auto_wwe_" + new Date().getTime();
                let newBtn = document.createElement("button");
                newBtn.id = newId;
                newBtn.className = "tab-btn";
                newBtn.style.backgroundColor = "#ff4757"; // تمييز الزرار باللون الأحمر
                newBtn.setAttribute("data-link", randomChannel.url);
                
                // تظبيط اسم القناة
                let chName = randomChannel.channel ? randomChannel.channel.replace(/\..*$/, '').replace(/_/g, ' ').toUpperCase() : "WWE LIVE 🤼‍♂️";
                newBtn.innerText = chName;
                newBtn.setAttribute("onclick", "playStream(this)");

                document.getElementById("mainTabs").appendChild(newBtn);
                
                showToast("عاش! لقطنا قناة مصارعة! جاري التشغيل... 🚀🤼‍♂️");
                
                // تشغيل القناة وعمل تمرير للزرار
                playStream(newBtn);
                newBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

            } catch (error) {
                console.error("Error fetching WWE:", error);
                showToast("حصلت مشكلة في الاتصال بقاعدة البيانات ❌");
            } finally {
                // إرجاع الزرار لحالته
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>

</body></html>
